<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POCKET DIMENSION</title>
  <link href="../css/style.css" rel="stylesheet" type="text/css" media="all">
  <link href="style.css" rel="stylesheet" type="text/css" media="all">
</head>

<body data-log-path="log.json">
  <!-- Matrix Rain Background -->
  <canvas id="matrix-canvas"></canvas>

  <!-- CRT Monitor Effects -->
  <div class="crt-overlay"></div>

  <div class="bento-container">
    <header class="card noise">
      <h1
        class="glitch neon-pulse"
        data-text="PROTOCOL_WIRED // USER: pocketPerson"
      >
        PROTOCOL_WIRED // USER: pocketPerson
      </h1>
      <p class="status-bar">
        LOC: NEO-KYOTO // STATUS: <span class="blink">SYNCING...</span>
      </p>
      <div class="timezone-class" id="timezone-container">
        <!-- Timezones will be dynamically inserted here -->
      </div>
    </header>

    <nav class="card hologram">
      <h2>DIRECTORY</h2>
      <div class="navDiv">
        <ul>
          <li><a class="chromatic" href="../">> root</a></li>
          <li><a class="chromatic" href="../intel/">> intel</a></li>
          <li><a class="chromatic nav-active" href="../logs/">> logs</a></li>
          <li><a class="chromatic" href="../experiment/">> experiment</a></li>
        </ul>
      </div>
      <div
        class="nav-footer"
      >
        <p>
          VISITORS: <span class="views terminal-cursor"></span>
        </p>
      </div>
    </nav>

    <main class="card distortion">
      <div class="data-stream">
        <div class="data-line">01001100 01000001 01001001 01001110</div>
        <div class="data-line">GHOST::SHELL::PROTOCOL</div>
        <div class="data-line">0xDEADBEEF 0xCAFEBABE</div>
        <div class="data-line">AKIRA::NEO_TOKYO::2019</div>
      </div>
      <h2>TRANSMISSION_LOG</h2>
      <div id="logs"></div>
    </main>
  </div>
  <script src="../code/script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      hitcount();
      updateTimezoneSlider();
      window.setInterval(updateTimezoneSlider, TIMEZONE_DELAY_MS);
      initMatrixRain();
      triggerRandomGlitch();
      logPage();
    });
  </script>
</body>

</html>
